<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>სერვის მენეჯერების რეპორტი</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; }
    h1 { color: #1565c0; }
    .toolbar { margin: 1em 0; }
    .btn { padding: 12px 24px; background: #1565c0; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; }
    .btn:hover { background: #0d47a1; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-debug { background: #6a1b9a; margin-top: 0.5em; }
    .btn-debug:hover { background: #4a148c; }
    #status { margin: 0.5em 0; color: #666; min-height: 1.5em; }
    #report { overflow-x: auto; margin-top: 1em; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
    thead th { background: #1565c0; color: #fff; }
    tbody tr:nth-child(even) { background: #f5f5f5; }
    tbody tr:nth-child(odd) { background: #fff; }
    td.filled { background: #e3f2fd; }
    th.manager-header { white-space: normal; vertical-align: top; min-width: 120px; }
    th.manager-header .manager-name { font-weight: 700; display: block; }
    th.manager-header .manager-details { font-size: 0.85em; font-weight: normal; opacity: 0.95; }
    .error { color: #c62828; }
  </style>
</head>
<body>
  <h1>პროექტების მიხედვით სართულებზე მომაგრებული სერვის მენეჯერები</h1>
  <div class="toolbar">
    <button type="button" class="btn" id="countBtn">ლისტი 82 – ჩანაწერების ზუსტი რაოდენობა</button>
    <span id="countResult" style="margin-left:1em; font-weight:600;"></span>
  </div>
  <div class="toolbar">
    <button type="button" class="btn" id="loadBtn">რეპორტის ჩატვირთვა</button>
    <div id="status"></div>
  </div>
  <div class="toolbar">
    <button type="button" class="btn btn-debug" id="debugBtn">დებაგი – რა ჩანაწერი მოდის</button>
  </div>
  <div id="report"></div>
  <div id="debugOutput" style="display:none; margin-top:1em; padding:1em; background:#f5f5f5; border:1px solid #ccc; font-family:monospace; font-size:12px; white-space:pre-wrap; max-height:400px; overflow:auto;"></div>

  <script>
    const CONFIG = {
      apiUrl: '/api/report',
      pageSize: 50,
      maxRecords: 60,
      delayMs: 400,
      fields: {
        project: 'PROPERTY_430',
        floors: 'PROPERTY_1033',
        floorFrom: 'PROPERTY_1474',
        floorTo: 'PROPERTY_1476',
        responsible: 'PROPERTY_434',
      },
    };

    var DEBUG_FIRST_ELEMENT = null;

    function getField(el, key) {
      const fieldId = (CONFIG.fields[key] || '').replace('PROPERTY_', '');
      const tryKeys = fieldId ? [CONFIG.fields[key], 'PROPERTY_' + fieldId, fieldId, key] : [key];
      for (const k of tryKeys) {
        if (k && el[k] != null) return el[k];
      }
      if (el.properties && typeof el.properties === 'object') {
        if (el.properties[CONFIG.fields[key]] != null) return el.properties[CONFIG.fields[key]];
        if (el.properties[fieldId] != null) return el.properties[fieldId];
      }
      if (el.fields && typeof el.fields === 'object') {
        if (el.fields[CONFIG.fields[key]] != null) return el.fields[CONFIG.fields[key]];
      }
      var num = { project: '430', floors: '1033', floorFrom: '1474', floorTo: '1476', responsible: '434' }[key];
      if (num) {
        for (const k of Object.keys(el)) {
          if (String(k).indexOf(num) !== -1 && el[k] != null) return el[k];
        }
      }
      return null;
    }

    function parseFloors(val) {
      if (val == null) return '';
      if (Array.isArray(val)) return val.map(function (v) { return typeof v === 'object' && v && v.value != null ? String(v.value) : String(v); }).filter(Boolean).join(', ');
      if (typeof val === 'object') return String(val.value ?? val.text ?? val.name ?? '').trim();
      return String(val).trim();
    }

    function parseManager(val) {
      if (val == null) return { key: '—', name: '—', email: '', number: '', internal: '' };
      if (typeof val === 'string') {
        var m = val.match(/\(([^)]+)\)\s*(.*)/);
        var email = m ? m[1].trim() : '';
        var name = m ? m[2].trim() : val.trim();
        return { key: email || name || '—', name: name || '—', email: email, number: '', internal: '' };
      }
      if (typeof val !== 'object') return { key: String(val), name: String(val), email: '', number: '', internal: '' };
      const name = val.title ?? val.name ?? val.NAME ?? val.value ?? '';
      const email = val.email ?? val.EMAIL ?? '';
      const number = val.phone ?? val.phoneNumber ?? val.number ?? val.NUMBER ?? '';
      const internal = val.internalNumber ?? val.internal ?? '';
      const key = email || name || (number + internal) || '—';
      return { key: String(key), name: String(name || '—'), email: String(email), number: String(number), internal: String(internal) };
    }

    function unwrapVal(v) {
      if (v == null) return v;
      if (typeof v !== 'object') return v;
      return v.value ?? v.text ?? v.name ?? v.title ?? v.NAME ?? v.VALUE ?? (Array.isArray(v) ? v[0] : null);
    }

    function parseElement(el) {
      var projectRaw = getField(el, 'project') ?? getField(el, 'NAME');
      var project = '';
      if (projectRaw != null) {
        if (typeof projectRaw === 'object') project = projectRaw.name ?? projectRaw.title ?? projectRaw.value ?? projectRaw.NAME ?? '';
        else project = String(projectRaw);
      }
      project = String(project || '').trim();
      if (project === 'მენეჯერი') project = '';
      var floorsRaw = getField(el, 'floors');
      var floorRange = parseFloors(unwrapVal(floorsRaw) ?? floorsRaw);
      if (!floorRange) {
        var from = parseInt(unwrapVal(getField(el, 'floorFrom')) || getField(el, 'floorFrom'), 10);
        var to = parseInt(unwrapVal(getField(el, 'floorTo')) || getField(el, 'floorTo'), 10);
        if (Number.isFinite(from) && Number.isFinite(to)) floorRange = from === to ? String(from) : from + '-' + to;
        else if (Number.isFinite(from)) floorRange = String(from);
        else if (Number.isFinite(to)) floorRange = String(to);
      }
      var responsibleRaw = getField(el, 'responsible');
      var manager = parseManager(unwrapVal(responsibleRaw) ?? responsibleRaw);
      return {
        project: project.trim(),
        floorRange: floorRange || '',
        manager,
      };
    }

    function buildPivot(elements) {
      const byProject = new Map();
      const managersMap = new Map();
      for (const el of elements) {
        const { project, floorRange, manager } = parseElement(el);
        if (!project) continue;
        const floorStr = (floorRange || '').trim();
        const key = manager.key;
        managersMap.set(key, manager);
        if (!byProject.has(project)) byProject.set(project, new Map());
        const managers = byProject.get(project);
        if (!managers.has(key)) managers.set(key, []);
        if (floorStr) managers.get(key).push(floorStr);
      }
      const managers = Array.from(managersMap.entries()).sort((a, b) => (a[1].name || a[0]).localeCompare((b[1].name || b[0]), 'ka'));
      const projects = Array.from(byProject.keys()).sort((a, b) => a.localeCompare(b, 'ka'));
      return { projects, managers, byProject };
    }

    function mergeRanges(ranges) {
      const uniq = [...new Set(ranges)].filter(Boolean).sort((a, b) => (a + '').localeCompare(b + '', undefined, { numeric: true }));
      return uniq.join(', ');
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderTable(pivot) {
      const { projects, managers, byProject } = pivot;
      const headCells = managers.map(([key, m]) => {
        const lines = [m.name || '—', m.email, m.number, m.internal].filter(Boolean);
        const content = lines.map(l => escapeHtml(l)).join('<br>');
        return '<th scope="col" class="manager-header"><div class="manager-name">' + escapeHtml(m.name || '—') + '</div><div class="manager-details">' + (m.email ? escapeHtml(m.email) + '<br>' : '') + (m.number ? escapeHtml(m.number) + (m.internal ? ' / ' + escapeHtml(m.internal) : '') : m.internal ? escapeHtml(m.internal) : '') + '</div></th>';
      }).join('');
      const rows = projects.map(project => {
        const cells = managers.map(([key]) => {
          const ranges = byProject.get(project)?.get(key) ?? [];
          const text = mergeRanges(ranges);
          return '<td class="' + (text ? 'filled' : '') + '">' + escapeHtml(text) + '</td>';
        });
        return '<tr><th scope="row">' + escapeHtml(project) + '</th>' + cells.join('') + '</tr>';
      });
      return (
        '<p style="color:#666;">განახლება: ' + new Date().toLocaleString('ka-GE') + '</p>' +
        '<table><thead><tr><th class="col-project">პროექტი</th>' + headCells + '</tr></thead><tbody>' + rows.join('') + '</tbody></table>'
      );
    }

    async function runDebug() {
      var out = document.getElementById('debugOutput');
      var btn = document.getElementById('debugBtn');
      out.style.display = 'block';
      out.textContent = 'დებაგი: იტვირთება…';
      btn.disabled = true;
      var url = CONFIG.apiUrl + '?start=0';
      var lines = [];
      lines.push('=== დებაგი: რა ჩანაწერი მოდის API-დან ===');
      lines.push('მოთხოვნის URL: ' + url);
      lines.push('');
      try {
        var r = await fetch(url);
        lines.push('პასუხის სტატუსი: ' + r.status + ' ' + r.statusText);
        var batch = await r.json();
        if (!Array.isArray(batch)) {
          lines.push('პასუხი არ არის მასივი: ' + typeof batch);
          if (batch && batch.error) lines.push('შეცდომა: ' + (batch.error_description || batch.error));
          out.textContent = lines.join('\n');
          return;
        }
        lines.push('პირველი გვერდი (start=0): ჩანაწერების რაოდენობა = ' + batch.length);
        if (batch.length > 0) {
          var first = batch[0];
          lines.push('');
          lines.push('--- პირველი ჩანაწერის ველების სახელები ---');
          lines.push(Object.keys(first).join(', '));
          lines.push('');
          lines.push('--- პირველი ჩანაწერი: ID, IBLOCK_ID, NAME (რომელი ლისტია) ---');
          lines.push('ID: ' + (first.ID != null ? first.ID : '(არა)'));
          lines.push('IBLOCK_ID: ' + (first.IBLOCK_ID != null ? first.IBLOCK_ID : '(არა)'));
          lines.push('NAME: ' + (first.NAME != null ? first.NAME : '(არა)'));
          if (first.IBLOCK_SECTION_ID != null) lines.push('IBLOCK_SECTION_ID: ' + first.IBLOCK_SECTION_ID);
          lines.push('');
          lines.push('--- პირველი 20 ჩანაწერის ID-ები (რომ შეადაროთ Bitrix-ს) ---');
          var ids = batch.slice(0, 20).map(function (x) { return x.ID || x.id || '?'; });
          lines.push(ids.join(', '));
          var parsed = parseElement(first);
          lines.push('');
          lines.push('--- პირველი ჩანაწერიდან დაპარსილი (რეპორტისთვის) ---');
          lines.push('პროექტი: "' + parsed.project + '"');
          lines.push('სართულები: "' + parsed.floorRange + '"');
          lines.push('მენეჯერი: "' + (parsed.manager ? parsed.manager.name : '') + '"');
          if (!parsed.project || !parsed.floorRange) lines.push('>>> თუ ცარიელია, ველების ID-ები (430, 1033, 1474, 1476, 434) შეიძლება არ ემთხვეოდეს Bitrix-ს.');
          lines.push('');
          lines.push('კონსოლში (F12 → Console): პირველი ჩანაწერის სრული ობიექტი = window.__debugFirstRecord');
          window.__debugFirstRecord = first;
          window.__debugBatchSize = batch.length;
          console.log('დებაგი: პირველი ჩანაწერი (სრულად)', first);
          console.log('დებაგი: პირველი გვერდის ჩანაწერების რაოდენობა', batch.length);
        }
        out.textContent = lines.join('\n');
      } catch (e) {
        lines.push('შეცდომა: ' + e.message);
        out.textContent = lines.join('\n');
      } finally {
        btn.disabled = false;
      }
    }

    async function fetchTotalCount() {
      const btn = document.getElementById('countBtn');
      const el = document.getElementById('countResult');
      btn.disabled = true;
      el.textContent = 'იტვირთება…';
      var total = 0;
      var start = 0;
      var page = 1;
      var maxPages = 500;
      try {
        for (var i = 0; i < maxPages; i++) {
          var r = await fetch(CONFIG.apiUrl + '?start=' + start);
          if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
          var batch = await r.json();
          if (!Array.isArray(batch)) throw new Error('არასწორი პასუხი');
          if (batch.length === 0) break;
          total += batch.length;
          el.textContent = 'გვერდი ' + page + '… სულ ნაპოვნი: ' + total;
          if (batch.length < CONFIG.pageSize) break;
          start += CONFIG.pageSize;
          page++;
          await new Promise(function (res) { setTimeout(res, CONFIG.delayMs); });
        }
        el.textContent = 'ლისტი 82: სულ ' + total + ' ჩანაწერი';
        el.style.color = '';
      } catch (err) {
        el.textContent = 'შეცდომა: ' + err.message;
        el.style.color = '#c62828';
      } finally {
        btn.disabled = false;
      }
    }

    async function loadReport() {
      const btn = document.getElementById('loadBtn');
      const status = document.getElementById('status');
      const report = document.getElementById('report');
      btn.disabled = true;
      report.innerHTML = '';
      status.textContent = 'იტვირთება…';
      status.className = '';

      const all = [];
      let start = 0;
      let page = 1;

      try {
        for (;;) {
          const url = CONFIG.apiUrl + '?start=' + start;
          const r = await fetch(url);
          if (!r.ok) throw new Error('მოთხოვნა ვერ შესრულდა: ' + r.status + ' ' + r.statusText);
          const batch = await r.json();
          if (!Array.isArray(batch)) throw new Error('არასწორი პასუხის ფორმატი');
          if (batch.length === 0) break;
          const need = CONFIG.maxRecords == null ? batch.length : Math.min(batch.length, CONFIG.maxRecords - all.length);
          all.push(...batch.slice(0, need));
          status.textContent = 'გვერდი ' + page + ': ' + batch.length + ' ჩანაწერი (სულ: ' + all.length + ')';
          if (batch.length < CONFIG.pageSize || (CONFIG.maxRecords != null && all.length >= CONFIG.maxRecords)) break;
          start += CONFIG.pageSize;
          page++;
          await new Promise(r => setTimeout(r, CONFIG.delayMs));
        }

        if (all.length === 0) {
          status.textContent = 'ჩანაწერი არ მოიძებნა.';
          status.className = 'error';
          return;
        }

        DEBUG_FIRST_ELEMENT = all[0];
        const pivot = buildPivot(all);
        if (pivot.projects.length === 0 || pivot.managers.length === 0) {
          console.log('პირველი ჩანაწერის სტრუქტურა (API პასუხი):', DEBUG_FIRST_ELEMENT);
          var keys = DEBUG_FIRST_ELEMENT ? Object.keys(DEBUG_FIRST_ELEMENT) : [];
          report.innerHTML = '<div class="error" style="margin:1em 0;">პროექტები/მენეჯერები ვერ მოიძებნა. ველების სახელები ჩანაწერში: <code>' + keys.join(', ') + '</code>. გახსენით ბრაუზერის კონსოლი (F12) → Console, იქ იხილეთ პირველი ჩანაწერის სრული ობიექტი.</div>' + (pivot.projects.length ? renderTable(pivot) : '');
        } else {
          report.innerHTML = renderTable(pivot);
        }
        status.textContent = 'დასრულებული. ჩანაწერები: ' + all.length + ', პროექტები: ' + pivot.projects.length + ', მენეჯერები: ' + pivot.managers.length;
      } catch (err) {
        status.textContent = 'შეცდომა: ' + err.message;
        status.className = 'error';
        report.innerHTML = '<p class="error">თუ 404-ს ხედავთ, საიტი უნდა იყოს დეპლოირებული (მაგ. Vercel-ზე), რათა /api/report იმუშაოს.</p>';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadReport);
    document.getElementById('countBtn').addEventListener('click', fetchTotalCount);
    document.getElementById('debugBtn').addEventListener('click', runDebug);
  </script>
</body>
</html>
