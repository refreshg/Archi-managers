<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>სერვის მენეჯერების რეპორტი</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; }
    h1 { color: #1565c0; }
    .toolbar { margin: 1em 0; }
    .btn { padding: 12px 24px; background: #1565c0; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; }
    .btn:hover { background: #0d47a1; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin: 0.5em 0; color: #666; min-height: 1.5em; }
    #report { overflow-x: auto; margin-top: 1em; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
    thead th { background: #1565c0; color: #fff; }
    tbody tr:nth-child(even) { background: #f5f5f5; }
    tbody tr:nth-child(odd) { background: #fff; }
    td.filled { background: #e3f2fd; }
    th.manager-header { white-space: normal; vertical-align: top; min-width: 120px; }
    th.manager-header .manager-name { font-weight: 700; display: block; }
    th.manager-header .manager-details { font-size: 0.85em; font-weight: normal; opacity: 0.95; }
    .error { color: #c62828; }
  </style>
</head>
<body>
  <h1>პროექტების მიხედვით სართულებზე მომაგრებული სერვის მენეჯერები</h1>
  <div class="toolbar">
    <button type="button" class="btn" id="loadBtn">რეპორტის ჩატვირთვა</button>
    <div id="status"></div>
  </div>
  <div id="report"></div>

  <script>
    const CONFIG = {
      apiUrl: '/api/report',
      pageSize: 50,
      maxRecords: 500,
      delayMs: 400,
      fields: {
        project: 'PROPERTY_430',
        floors: 'PROPERTY_1033',
        responsible: 'PROPERTY_434',
      },
    };

    function getField(el, key) {
      if (el[key] != null) return el[key];
      const k = CONFIG.fields[key];
      if (k && el[k] != null) return el[k];
      return null;
    }

    function parseFloors(val) {
      if (val == null) return '';
      if (Array.isArray(val)) return val.map(String).filter(Boolean).join(', ');
      if (typeof val === 'object' && val.value != null) return String(val.value);
      return String(val).trim();
    }

    function parseManager(val) {
      if (val == null || typeof val !== 'object') return { key: String(val || '—'), name: String(val || '—'), email: '', number: '', internal: '' };
      const name = val.title ?? val.name ?? val.NAME ?? val.value ?? '';
      const email = val.email ?? val.EMAIL ?? '';
      const number = val.phone ?? val.phoneNumber ?? val.number ?? val.NUMBER ?? '';
      const internal = val.internalNumber ?? val.internal ?? '';
      const key = email || name || (number + internal) || '—';
      return { key: String(key), name: String(name || '—'), email: String(email), number: String(number), internal: String(internal) };
    }

    function parseElement(el) {
      let project = getField(el, 'project') ?? getField(el, 'NAME') ?? '';
      if (project && typeof project === 'object') project = project.name ?? project.title ?? project.value ?? project.NAME ?? '';
      const floorsRaw = getField(el, 'floors');
      const floorRange = parseFloors(floorsRaw);
      const responsibleRaw = getField(el, 'responsible');
      const manager = parseManager(responsibleRaw);
      return {
        project: String(project).trim(),
        floorRange,
        manager,
      };
    }

    function buildPivot(elements) {
      const byProject = new Map();
      const managersMap = new Map();
      for (const el of elements) {
        const { project, floorRange, manager } = parseElement(el);
        if (!project) continue;
        const floorStr = (floorRange || '').trim();
        if (!floorStr) continue;
        const key = manager.key;
        managersMap.set(key, manager);
        if (!byProject.has(project)) byProject.set(project, new Map());
        const managers = byProject.get(project);
        if (!managers.has(key)) managers.set(key, []);
        managers.get(key).push(floorStr);
      }
      const managers = Array.from(managersMap.entries()).sort((a, b) => (a[1].name || a[0]).localeCompare((b[1].name || b[0]), 'ka'));
      const projects = Array.from(byProject.keys()).sort((a, b) => a.localeCompare(b, 'ka'));
      return { projects, managers, byProject };
    }

    function mergeRanges(ranges) {
      const uniq = [...new Set(ranges)].filter(Boolean).sort((a, b) => (a + '').localeCompare(b + '', undefined, { numeric: true }));
      return uniq.join(', ');
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderTable(pivot) {
      const { projects, managers, byProject } = pivot;
      const headCells = managers.map(([key, m]) => {
        const lines = [m.name || '—', m.email, m.number, m.internal].filter(Boolean);
        const content = lines.map(l => escapeHtml(l)).join('<br>');
        return '<th scope="col" class="manager-header"><div class="manager-name">' + escapeHtml(m.name || '—') + '</div><div class="manager-details">' + (m.email ? escapeHtml(m.email) + '<br>' : '') + (m.number ? escapeHtml(m.number) + (m.internal ? ' / ' + escapeHtml(m.internal) : '') : m.internal ? escapeHtml(m.internal) : '') + '</div></th>';
      }).join('');
      const rows = projects.map(project => {
        const cells = managers.map(([key]) => {
          const ranges = byProject.get(project)?.get(key) ?? [];
          const text = mergeRanges(ranges);
          return '<td class="' + (text ? 'filled' : '') + '">' + escapeHtml(text) + '</td>';
        });
        return '<tr><th scope="row">' + escapeHtml(project) + '</th>' + cells.join('') + '</tr>';
      });
      return (
        '<p style="color:#666;">განახლება: ' + new Date().toLocaleString('ka-GE') + '</p>' +
        '<table><thead><tr><th class="col-project">პროექტი</th>' + headCells + '</tr></thead><tbody>' + rows.join('') + '</tbody></table>'
      );
    }

    async function loadReport() {
      const btn = document.getElementById('loadBtn');
      const status = document.getElementById('status');
      const report = document.getElementById('report');
      btn.disabled = true;
      report.innerHTML = '';
      status.textContent = 'იტვირთება…';
      status.className = '';

      const all = [];
      let start = 0;
      let page = 1;

      try {
        for (;;) {
          const url = CONFIG.apiUrl + '?start=' + start;
          const r = await fetch(url);
          if (!r.ok) throw new Error('მოთხოვნა ვერ შესრულდა: ' + r.status + ' ' + r.statusText);
          const batch = await r.json();
          if (!Array.isArray(batch)) throw new Error('არასწორი პასუხის ფორმატი');
          if (batch.length === 0) break;
          const need = CONFIG.maxRecords == null ? batch.length : Math.min(batch.length, CONFIG.maxRecords - all.length);
          all.push(...batch.slice(0, need));
          status.textContent = 'გვერდი ' + page + ': ' + batch.length + ' ჩანაწერი (სულ: ' + all.length + ')';
          if (batch.length < CONFIG.pageSize || (CONFIG.maxRecords != null && all.length >= CONFIG.maxRecords)) break;
          start += CONFIG.pageSize;
          page++;
          await new Promise(r => setTimeout(r, CONFIG.delayMs));
        }

        if (all.length === 0) {
          status.textContent = 'ჩანაწერი არ მოიძებნა.';
          status.className = 'error';
          return;
        }

        const pivot = buildPivot(all);
        report.innerHTML = renderTable(pivot);
        status.textContent = 'დასრულებული. ჩანაწერები: ' + all.length + ', პროექტები: ' + pivot.projects.length + ', მენეჯერები: ' + pivot.managers.length;
      } catch (err) {
        status.textContent = 'შეცდომა: ' + err.message;
        status.className = 'error';
        report.innerHTML = '<p class="error">თუ 404-ს ხედავთ, საიტი უნდა იყოს დეპლოირებული (მაგ. Vercel-ზე), რათა /api/report იმუშაოს.</p>';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadReport);
  </script>
</body>
</html>
